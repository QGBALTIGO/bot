<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Coleção Baltigo</title>

<link rel="stylesheet" href="/css/style.css">

</head>

<body class="bg">

<div class="container">

<h1 class="title">📦 Minha Coleção</h1>

<div id="stats">

🪙 <span id="coins">-</span>
🎡 <span id="giros">-</span>

</div>

<input
id="search"
placeholder="Buscar personagem..."
class="search"
/>

<div id="cards" class="grid"></div>

</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>

const tg = window.Telegram?.WebApp;

if(tg){
tg.ready();
tg.expand();
}

async function loadCollection(){

const res = await fetch("/api/me/collection",{
headers:{
"X-Telegram-Init-Data":tg.initData
}
});

const data = await res.json();

document.getElementById("coins").innerText=data.coins;
document.getElementById("giros").innerText=data.giros;

const grid=document.getElementById("cards");

grid.innerHTML="";

data.cards.forEach(card=>{

const el=document.createElement("div");

el.className="card";

el.innerHTML=`

<img src="${card.image}">

<div class="card-info">

<div class="card-name">${card.character_name}</div>

<div class="card-anime">${card.anime_title}</div>

</div>

`;

grid.appendChild(el);

});

}

loadCollection();

</script>

</body>
</html>
